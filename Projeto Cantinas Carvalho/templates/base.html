<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cantinas Carvalho - {% block title %}{% endblock %} </title>
    <link rel="icon" href="{{ url_for('static', filename='assets/icons/logo.png') }}" />
    {% block head %}{% endblock %}
</head>

<body>
    <header class="header-superior">
        <div id="logo-container">
            <img src="{{ url_for('static', filename='assets/icons/logo.png') }}" id="logo" alt="Logo Cantinas Carvalho" />
        </div>

        <label class="theme-toggle">
            <input type="checkbox" id="theme-switch" />
            <span class="slider"></span>
        </label>
    </header>

    <nav class="container-pages">
        <ul class="container-pages-links" id="nav-links">
            <li>
                <a href="{{ url_for('produtos') }}" class="{{ 'pages-links-pagina-atual' if request.endpoint == 'produtos' else 'pages-links' }}"> Produtos </a>
            </li>
            <li>
                <a href="{{ url_for('pedidos') }}" class="{{ 'pages-links-pagina-atual' if request.endpoint == 'pedidos' else 'pages-links' }}"> Pedidos </a>
            </li>
            <li>
                <a href="{{ url_for('relatorios') }}" class="{{ 'pages-links-pagina-atual' if request.endpoint == 'relatorios' else 'pages-links' }}"> Relatórios </a>
            </li>
            <li>
                <a href="{{ url_for('usuarios') }}" class="{{ 'pages-links-pagina-atual' if request.endpoint == 'usuarios' else 'pages-links' }}"> Usuários</a>
            </li>
        </ul>

        <button class="hamburger" id="menu-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav-links">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="linha-decorativa"></div>

    <main> {% block content %}{% endblock %} </main>

    <script src="{{ url_for('static', filename='js/base.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
